<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Rota Marítima Manual</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #ebe7df;
      --panel: rgba(248, 246, 241, 0.94);
      --panel-border: rgba(25, 31, 36, 0.12);
      --text: #1d2329;
      --muted: #6c737b;
      --surface: rgba(255, 255, 255, 0.68);
      --surface-strong: #ffffff;
      --surface-hover: #f1eee8;
      --line: #2f3f4b;
      --danger: #7a3b32;
      --danger-hover: #673128;
      --shadow: 0 18px 42px rgba(15, 18, 22, 0.16);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100vh;
      background: #ddd8ce;
    }

    .leaflet-container {
      background: #ddd8ce;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    .leaflet-tile {
      filter: saturate(0.72) contrast(0.98) brightness(1.02);
    }

    .leaflet-control-zoom {
      border: 0 !important;
      box-shadow: 0 10px 24px rgba(0,0,0,0.12) !important;
      border-radius: 16px !important;
      overflow: hidden;
    }

    .leaflet-control-zoom a {
      background: rgba(255, 255, 255, 0.94) !important;
      color: #1d2329 !important;
      border: 0 !important;
      border-bottom: 1px solid rgba(29, 35, 41, 0.08) !important;
      width: 34px !important;
      height: 34px !important;
      line-height: 34px !important;
      font-size: 18px !important;
    }

    .leaflet-control-zoom a:last-child {
      border-bottom: 0 !important;
    }

    .leaflet-control-zoom a:hover {
      background: #f1eee8 !important;
    }

    .leaflet-control-attribution {
      font-size: 10px;
      color: rgba(29, 35, 41, 0.72);
      background: rgba(248, 246, 241, 0.92) !important;
      border-radius: 10px 0 0 0;
      padding: 4px 8px !important;
    }

    .panel {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 1000;
      background: var(--panel);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius-lg);
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .title {
      margin: 0 0 10px 0;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .metric {
      background: var(--surface-strong);
      color: var(--text);
      border-radius: 16px;
      padding: 12px 14px;
      margin-bottom: 10px;
      border: 1px solid rgba(25, 31, 36, 0.08);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
    }

    .metric-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .metric-value .unit {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      margin-left: 4px;
    }

    .meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .meta-box {
      background: var(--surface);
      border: 1px solid rgba(25, 31, 36, 0.08);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .meta-label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .meta-value {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    button:active {
      transform: scale(0.985);
    }

    .btn-secondary {
      background: transparent;
      color: var(--text);
      border-color: rgba(25, 31, 36, 0.14);
    }

    .btn-secondary:hover {
      background: var(--surface-hover);
    }

    .btn-danger {
      background: var(--danger);
      color: #fff;
    }

    .btn-danger:hover {
      background: var(--danger-hover);
    }

    .custom-marker {
      position: relative;
      width: 18px;
      height: 18px;
      background: #263640;
      border: 2px solid rgba(255,255,255,0.92);
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      box-shadow:
        0 0 0 4px rgba(255, 255, 255, 0.34),
        0 8px 18px rgba(0, 0, 0, 0.18);
    }

    .custom-marker::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: rgba(255,255,255,0.28);
    }

    .leaflet-tooltip.route-label {
      background: rgba(248, 246, 241, 0.96);
      border: 1px solid rgba(25, 31, 36, 0.12);
      color: #1d2329;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    .leaflet-tooltip.route-label:before {
      display: none;
    }

    @media (max-width: 420px) {
      .panel {
        padding: 12px;
        border-radius: 16px;
      }

      .metric-value {
        font-size: 23px;
      }

      button {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <div class="title">Rota Marítima Manual</div>

    <div class="metric">
      <div class="metric-label">Distância total</div>
      <div class="metric-value"><span id="distanceValue">0.00</span><span class="unit">MN</span></div>
    </div>

    <div class="meta">
      <div class="meta-box">
        <span class="meta-label">Pontos</span>
        <span class="meta-value" id="pointCount">0</span>
      </div>
      <div class="meta-box">
        <span class="meta-label">Último trecho</span>
        <span class="meta-value" id="lastLeg">0.00 MN</span>
      </div>
    </div>

    <div class="buttons">
      <button class="btn-secondary" id="undoBtn">Desfazer</button>
      <button class="btn-danger" id="clearBtn">Limpar</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { zoomControl: true }).setView([-23.01, -44.32], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: 'OpenSeaMap'
    }).addTo(map);

    let points = [];
    let markers = [];
    let polyline = L.polyline([], {
      color: '#2f3f4b',
      weight: 4,
      opacity: 0.9,
      lineJoin: 'round'
    }).addTo(map);

    const distanceValueEl = document.getElementById('distanceValue');
    const pointCountEl = document.getElementById('pointCount');
    const lastLegEl = document.getElementById('lastLeg');
    const clearBtn = document.getElementById('clearBtn');
    const undoBtn = document.getElementById('undoBtn');

    function toRad(deg) {
      return deg * Math.PI / 180;
    }

    function haversineNm(lat1, lon1, lat2, lon2) {
      const R_km = 6371.0088;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      const km = R_km * c;
      return km / 1.852;
    }

    function totalDistanceNm(coords) {
      let total = 0;
      for (let i = 1; i < coords.length; i++) {
        total += haversineNm(
          coords[i - 1].lat, coords[i - 1].lng,
          coords[i].lat, coords[i].lng
        );
      }
      return total;
    }

    function getLastLegNm(coords) {
      if (coords.length < 2) return 0;
      const a = coords[coords.length - 2];
      const b = coords[coords.length - 1];
      return haversineNm(a.lat, a.lng, b.lat, b.lng);
    }

    function createMarker(latlng, index) {
      const icon = L.divIcon({
        className: '',
        html: `<div class="custom-marker"></div>`,
        iconSize: [20, 20],
        iconAnchor: [6, 18]
      });

      return L.marker(latlng, { draggable: true, icon })
        .addTo(map)
        .bindTooltip(String(index + 1), {
          permanent: true,
          direction: 'top',
          offset: [0, -12],
          className: 'route-label'
        });
    }

    function rebuildMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = points.map((p, idx) => {
        const marker = createMarker(p, idx);

        marker.on('drag', () => {
          const ll = marker.getLatLng();
          points[idx] = { lat: ll.lat, lng: ll.lng };
          redraw();
        });

        return marker;
      });
    }

    function redraw() {
      polyline.setLatLngs(points);
      distanceValueEl.textContent = totalDistanceNm(points).toFixed(2);
      pointCountEl.textContent = String(points.length);
      lastLegEl.textContent = getLastLegNm(points).toFixed(2) + ' MN';
    }

    function addPoint(latlng) {
      points.push({ lat: latlng.lat, lng: latlng.lng });
      rebuildMarkers();
      redraw();
    }

    function clearRoute() {
      points = [];
      rebuildMarkers();
      redraw();
    }

    function undoLast() {
      if (!points.length) return;
      points.pop();
      rebuildMarkers();
      redraw();
    }

    map.on('click', function(e) {
      addPoint(e.latlng);
    });

    clearBtn.addEventListener('click', clearRoute);
    undoBtn.addEventListener('click', undoLast);

    redraw();
  </script>
</body>
</html>
