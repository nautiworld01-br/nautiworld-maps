<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Rota Marítima Manual</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    #map {
      width: 100%;
      height: 100vh;
      background: #fff;
    }

    .panel {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      z-index: 1000;
      background: rgba(255,255,255,0.96);
      border-radius: 14px;
      padding: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
    }

    .title {
      margin: 0 0 8px 0;
      font-size: 17px;
      font-weight: 700;
      color: #0b2341;
    }

    .metric {
      background: #0b2f66;
      color: #fff;
      border-radius: 12px;
      padding: 10px 12px;
      margin-bottom: 10px;
    }

    .metric-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      opacity: 0.85;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 20px;
      font-weight: 700;
      line-height: 1;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 12px;
      color: #334155;
      margin-bottom: 10px;
    }

    .buttons {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-secondary {
      background: #e8eef7;
      color: #17365f;
    }

    .btn-danger {
      background: #ef4444;
      color: #fff;
    }

    .leaflet-control-attribution {
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="panel">
    <div class="title">Rota Marítima Manual</div>

    <div class="metric">
      <div class="metric-label">Distância total</div>
      <div class="metric-value"><span id="distanceValue">0.00</span> MN</div>
    </div>

    <div class="meta">
      <div>Pontos: <strong id="pointCount">0</strong></div>
      <div>Último: <strong id="lastLeg">0.00 MN</strong></div>
    </div>

    <div class="buttons">
      <button class="btn-secondary" id="undoBtn">Desfazer</button>
      <button class="btn-danger" id="clearBtn">Limpar</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { zoomControl: true }).setView([-23.01, -44.32], 10);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    L.tileLayer('https://tiles.openseamap.org/seamark/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: 'OpenSeaMap'
    }).addTo(map);

    let points = [];
    let markers = [];
    let polyline = L.polyline([], {
      color: '#0b5bd3',
      weight: 4,
      opacity: 0.9
    }).addTo(map);

    const distanceValueEl = document.getElementById('distanceValue');
    const pointCountEl = document.getElementById('pointCount');
    const lastLegEl = document.getElementById('lastLeg');
    const clearBtn = document.getElementById('clearBtn');
    const undoBtn = document.getElementById('undoBtn');

    function toRad(deg) {
      return deg * Math.PI / 180;
    }

    function haversineNm(lat1, lon1, lat2, lon2) {
      const R_km = 6371.0088;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      const km = R_km * c;
      return km / 1.852;
    }

    function totalDistanceNm(coords) {
      let total = 0;
      for (let i = 1; i < coords.length; i++) {
        total += haversineNm(
          coords[i - 1].lat, coords[i - 1].lng,
          coords[i].lat, coords[i].lng
        );
      }
      return total;
    }

    function getLastLegNm(coords) {
      if (coords.length < 2) return 0;
      const a = coords[coords.length - 2];
      const b = coords[coords.length - 1];
      return haversineNm(a.lat, a.lng, b.lat, b.lng);
    }

    function createMarker(latlng, index) {
      return L.marker(latlng, { draggable: true })
        .addTo(map)
        .bindTooltip(String(index + 1), {
          permanent: true,
          direction: 'top',
          offset: [0, -8]
        });
    }

    function rebuildMarkers() {
      markers.forEach(m => map.removeLayer(m));
      markers = points.map((p, idx) => {
        const marker = createMarker(p, idx);

        marker.on('drag', () => {
          const ll = marker.getLatLng();
          points[idx] = { lat: ll.lat, lng: ll.lng };
          redraw();
        });

        return marker;
      });
    }

    function redraw() {
      polyline.setLatLngs(points);
      distanceValueEl.textContent = totalDistanceNm(points).toFixed(2);
      pointCountEl.textContent = String(points.length);
      lastLegEl.textContent = getLastLegNm(points).toFixed(2) + ' MN';
    }

    function addPoint(latlng) {
      points.push({ lat: latlng.lat, lng: latlng.lng });
      rebuildMarkers();
      redraw();
    }

    function clearRoute() {
      points = [];
      rebuildMarkers();
      redraw();
    }

    function undoLast() {
      if (!points.length) return;
      points.pop();
      rebuildMarkers();
      redraw();
    }

    map.on('click', function(e) {
      addPoint(e.latlng);
    });

    clearBtn.addEventListener('click', clearRoute);
    undoBtn.addEventListener('click', undoLast);

    redraw();
  </script>
</body>
</html>
